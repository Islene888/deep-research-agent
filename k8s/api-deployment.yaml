apiVersion: apps/v1
kind: Deployment
metadata:
  name: finsight-api
  labels:
    app: finsight-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finsight-api
  template:
    metadata:
      labels:
        app: finsight-api
    spec:
      containers:
        - name: api
          image: finsight-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: finsight-secrets
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: finsight-api
spec:
  selector:
    app: finsight-api
  ports:
    - port: 80
      targetPort: 8000
